project: autofolio
upstream:
  package: agent_runtime
  remote_url: https://github.com/ycpiglet/agent_runtime.git
  ref: v0.3.1
sync:
  mode: check-diff-apply
  allow_silent_overwrite: false
  # 호스트 소유(분기) 템플릿 파일 — sync 가 건너뜀(업데이트도 충돌도 없음).
  # 이걸로 Autofolio 튜닝이 업스트림 업데이트에 덮어써지지 않게 분리한다.
  # 근거·재조정 절차는 docs/AGENT_RUNTIME_INTEGRATION.md (§3 분기 원장 · §4 런북).
  unmanaged:
    - AGENTS.md
    - agents/roles.yml
    - schemas/task.schema.json
    - agents/lead_engineer/REPORTING-FORMAT.md
    - agents/project/SKILL-GOVERNANCE.md
    - CLAUDE.md
    - scripts/doc_steward_due.py
    # --- v0.3.0 sync (issue #101): 호스트 소유 시임 ---
    # autofolio 세션 상태(데이터) — 업스트림은 placeholder 템플릿
    - agents/project/NEXT-SESSION-POINTER.yml
    # 호스트 리서치 노트(autofolio 컨텍스트) — 업스트림은 example
    - agents/research_agent/notes/EVIDENCE-2026-06-03-001-requirement-elicitation.md
    # autofolio 고유: TASK-070 미만 identity grandfather
    - scripts/task_identity.py
