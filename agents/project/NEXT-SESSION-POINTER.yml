rules:
  live_work_continuity: >
    Update this pointer and task claim records while work is happening, not only
    at final handoff. It must answer who is working, from which team/pane, on
    which task, in which phase, with what progress, in which worktree, and what
    should happen next.
  repeated_request_api: >
    If the Owner repeats a request or criticism twice, convert it into a
    function, API, script, hook, gate, or explicit task proposal instead of
    leaving it as prose.
  compound_capture: >
    Repeated mistakes or criticisms must produce a Compound entry and an
    executable prevention step when feasible.
  measured_improvement: >
    Use Evaluate -> Propose -> Verify -> Merge. Keep one variable per verified
    change, preserve golden set failures and edge cases, and reserve final
    criteria and merge decisions for Owner.
verification:
  required:
    - python scripts/continuity_contract_gate.py --check
    - python scripts/owner_governance_gate.py --allow-empty-owner-docs
    - python scripts/check_agent_docs.py
