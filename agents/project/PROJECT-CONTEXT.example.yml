schema: agent-runtime-project-context/v1
updated_at: YYYY-MM-DDTHH:MM:SS+09:00

project:
  id: my-project
  name: My Project
  stage: mvp
  one_liner: Short description of what this project is building.
  primary_user: Who the MVP serves first.
  problem: The concrete problem this project solves.
  success_metric: The measurable signal that the MVP is working.

vision:
  purpose: Why this should exist.
  principles:
    - Principle 1
    - Principle 2
  non_goals:
    - What the project should not optimize for right now.

roadmap:
  source: agents/project/ROADMAP.md
  current_phase: MVP
  next_milestone: Milestone name and target date.
  release_policy: What counts as releasable.

organization:
  source: agents/project/ORG.md
  owner: Human final authority.
  decision_owner: Who decides product priority day to day.
  escalation: What must be escalated before mutation.

agent_teams:
  - id: product-core
    purpose: Build and verify the core MVP loop.
    roles: [ceo, lead-engineer, backend, uiux, qa]
    canonical_context:
      - agents/project/VISION.md
      - agents/project/ROADMAP.md
  - id: governance
    purpose: Keep decisions, risks, and handoff records consistent.
    roles: [managing-partner, independent-auditor, doc-steward, scribe]
    canonical_context:
      - agents/project/ORG.md
      - agents/lead_engineer/tasks/BACKLOG.md
  - id: finance-accounting
    purpose: Own monetization, pricing, billing, costs, assets, licenses, vendors, and revenue metrics.
    roles: [finance-controller, accounting-operator, asset-steward, revenue-analyst]
    canonical_context:
      - agents/project/VISION.md
      - agents/project/ROADMAP.md
      - agents/project/ORG.md
  - id: marketing-growth
    purpose: Own positioning, brand, content, SEO, campaigns, channel experiments, and performance analysis.
    roles: [marketing-lead, content-marketer, growth-analyst, brand-steward]
    canonical_context:
      - agents/project/VISION.md
      - agents/project/ROADMAP.md
      - agents/project/LINKS.md
  - id: sales-revenue
    purpose: Own ICP, leads, CRM pipeline, demos, proposals, partnerships, and compliant promotional operations.
    roles: [sales-lead, crm-operator, partnership-manager, sales-ops]
    canonical_context:
      - agents/project/VISION.md
      - agents/project/ROADMAP.md
      - agents/project/ORG.md

growth_automation_policy:
  allowed:
    - owned-channel scheduled posting
    - approved API posting
    - consent-based CRM follow-up
    - SEO/content analysis
    - campaign performance reporting
  prohibited:
    - viewbots
    - fake traffic or fake engagement
    - unauthorized bulk posting
    - spam
    - terms-of-service evasion
    - platform manipulation

links:
  - label: Product brief
    path: agents/project/VISION.md
    owner: ceo
  - label: Roadmap
    path: agents/project/ROADMAP.md
    owner: lead-engineer

runtime_policy:
  host_owned:
    - agents/project/**
    - agents/lead_engineer/tasks/**
    - agents/lead_engineer/reports/**
  do_not_customize_for_product:
    - agents/*/SKILL.md
    - agents/roles.yml
    - scripts/**
