required_when_closed:
  - resolution
  - completed_at
  - verification_status

computed_only_fields:
  progress_pct:
    storage_policy: computed_only
    computed_from: child_status_rollup
  age:
    storage_policy: computed_only
    computed_from: created_at_and_now
  lead_time:
    storage_policy: computed_only
    computed_from: started_at_and_completed_at
  est_actual_delta:
    storage_policy: computed_only
    computed_from: estimate_minus_actual
  rollup_progress_pct:
    storage_policy: computed_only
    computed_from: child_progress_pct
  variance:
    storage_policy: computed_only
    computed_from: estimate_minus_actual

