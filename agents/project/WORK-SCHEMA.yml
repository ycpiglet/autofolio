# WORK-SCHEMA.yml -- Work Item metadata catalog (single source of truth).
# Gated by scripts/work_schema_gate.py: `--check` validates this catalog,
# `--items --check` validates v1 work-item frontmatter against it.
#
# Field entry metadata (every cataloged field declares all of these):
#   type           value shape; enums also declare `allowed_values`
#   required_for   kinds that must store the field (see minimum_required_by_kind)
#   source         actor class that owns the value: generator|gate|human|runtime|derived
#   populated_by   concrete tool or role that writes the value
#   consumed_by    queries, stats, gates, and views that read the field
#   query_use      one-line purpose: which question this field answers
#
# Query/stat map -- which field groups feed which surfaces:
#   identity      schema_version, work_id, work_uid, kind, parent_id, *_id
#                 -> CRUD, board views, lineage rollups, migration tooling
#   provenance    origin_type, origin_ref, created_by, split_from, merged_into,
#                 supersedes, superseded_by, duplicate_of
#                 -> intake-source stats, dedup audits, decision-history queries
#   closure       status, resolution, completed_at, closed_by, reopened_count
#                 -> throughput stats, closeout-quality and reopen-rate stats
#   measurement   est_*/actual_* tokens|hours|cost, budget_cap, rework_count,
#                 gate_failure_count, xp_value
#                 -> budget gates, estimate-vs-actual variance, quality scoring
#   relations     blocks, blocked_by, relates_to, evidence_refs, review_refs,
#                 commit_refs, pr_refs, a2a_context_id, claim_refs
#                 -> dependency graphs, critical path, evidence and audit chains
#   governance    risk_tier, approval_required, security_sensitive, stakeholders,
#                 watchers, due_date, blocked_since, *_model_tier
#                 -> approval/security gates, dispatch routing, flow stats
#   verification  verification_status, verified_at, verified_by, verification
#                 -> closeout gate, stale-verification detection, audit
#   display       title, summary, tags, area, component
#                 -> board, search, explorer rendering without prose parsing
#
# Derived values (progress_pct, age, lead_time, est_actual_delta alias
# variance, rollup_progress_pct) are computed-only: storing them in work-item
# frontmatter is a gate failure. See computed_only_fields.
schema_version: agent-runtime-work-schema/v1
schema_owner: planning-office
updated_at: 2026-06-13T02:05:00+09:00
unknown_field_policy: watch
derived_field_policy: computed_only
custom_property_policy: register_here_first

# Field source classes: the actor class that owns and populates a field value.
# generator = record-producing tool (work_cli, work_split)
# gate      = automated gates and reviewers writing quality counters
# human     = Owner or planner judgment (priority, risk, scope, relations)
# runtime   = lifecycle tooling (claims, closeout, verification, a2a routing)
# derived   = computed caches written only by the stats engine (xp_value)
field_source_values:
  - generator
  - gate
  - human
  - runtime
  - derived

# Promotion policy (Owner 2026-06-12 anti-bloat decision): every field enters
# the catalog as OPTIONAL; per-kind REQUIRED stays minimal (identity +
# provenance + closure semantics only). A field is promoted into
# minimum_required_by_kind only after a consuming tool (gate, query, stat, or
# dispatcher) actually reads it -- never speculatively. If the consumer is
# removed, the field is demoted back to optional. Unknown fields surface as
# `watch` warnings until registered here; custom properties register through
# this same dictionary -- one system, not two.
field_promotion_policy:
  default_entry: optional
  required_baseline: identity_provenance_closure_only
  promote_to_required_when: consuming_tool_exists
  demote_when: consuming_tool_removed
  unknown_fields: watch_then_register
  custom_properties: register_in_this_catalog

work_kinds:
  - initiative
  - taskset
  - task
  - unit
  - routine
  - spike

closed_resolution_values:
  - done
  - wontfix
  - duplicate
  - superseded
  - moved_to_vault

required_core_fields:
  - schema_version
  - work_id
  - work_uid
  - kind
  - status
  - owner
  - created_at
  - updated_at
  - origin_type
  - origin_ref
  - created_by

