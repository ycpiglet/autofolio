  initiative:
    - schema_version
    - work_id
    - work_uid
    - kind
    - status
    - owner
    - created_at
    - updated_at
    - origin_type
    - origin_ref
    - created_by
  taskset:
    - schema_version
    - work_id
    - work_uid
    - kind
    - parent_id
    - status
    - owner
    - created_at
    - updated_at
    - origin_type
    - origin_ref
    - created_by
  task:
    - schema_version
    - work_id
    - work_uid
    - kind
    - parent_id
    - status
    - owner
    - created_at
    - updated_at
    - origin_type
    - origin_ref
    - created_by
  unit:
    - schema_version
    - work_id
    - work_uid
    - kind
    - parent_id
    - status
    - owner
    - created_at
    - updated_at
    - origin_type
    - origin_ref
    - created_by
    - verification_status
  routine:
    - schema_version
    - work_id
    - work_uid
    - kind
    - status
    - owner
    - created_at
    - updated_at
    - origin_type
    - origin_ref
    - created_by
  spike:
    - schema_version
    - work_id
    - work_uid
    - kind
    - parent_id
    - status
    - owner
    - created_at
    - updated_at
    - origin_type
    - origin_ref
