      - agents/backend_engineer/SKILL.md
      - app/database/schema.sql
      - "관련 TASK 본문"
    forbidden_inputs: []
    output_contract:
      - "SQLite 마이그레이션 / repositories / 엔진·리스크 코드 (app/database·app/engine·app/risk)"
      - "pytest tests/ 통과 evidence"
    audit_gate: true
    default_subagents: [implementer, reviewer, skeptic]
    notes: |
      Auth/row-level policy/배포 변경은 audit gate 자동 적용.

  - id: ci-cd
    aliases: [ci-cd, cicd, ci]
    skill_file: agents/cicd_engineer/SKILL.md
    required_inputs:
      - AGENTS.md
      - agents/cicd_engineer/SKILL.md
      - .github/workflows/test.yml
      - requirements.txt
      - "관련 TASK 본문"
    forbidden_inputs: []
    output_contract:
      - "PR 생성·머지·롤백 / CI 워크플로 변경"
      - "KIS 환경 승급(mock→모의→실전) 확인 / pytest 통과"
    audit_gate: false
    default_subagents: [implementer, reviewer]
    notes: |
      배포·시크릿 관련 변경은 audit_gate true로 escalate.

  - id: uiux
    aliases: [uiux, ui, ux, frontend]
    skill_file: agents/uiux_designer/SKILL.md
    required_inputs:
      - AGENTS.md
      - agents/uiux_designer/SKILL.md
      - web/src/app/
      - web/src/components/
      - app/api/
      - "관련 TASK 본문"
    forbidden_inputs: []
    output_contract:
      - "프런트엔드 코드 / 접근성 / 반응형 / 브라우저 검증"
      - "Playwright/Next.js 브라우저 검증 evidence (web/)"
    audit_gate: false
    default_subagents: [implementer, reviewer]
    notes: |
      XSS/세션/권한 관련 UI 변경은 audit_gate true로 escalate.

  - id: qa
    aliases: [qa, test]
    skill_file: agents/qa/SKILL.md
    required_inputs:
      - AGENTS.md
      - agents/qa/SKILL.md
      - agents/qa/TEST-STRATEGY.md
      - tests/
      - "관련 TASK 본문"
      - "관련 BTC-*.md (있으면)"
    forbidden_inputs: []
    output_contract:
      - "BUG 리포트 / E2E 회귀 케이스 / 검증 결과"
      - "BTC → BUG 변환 (Beta Tester 입력 시)"
    audit_gate: false
    default_subagents: [reviewer, auditor, skeptic]
    notes: |
      QA의 audit_gate는 대상 TASK의 priority 따라간다.

  - id: beta-tester
    aliases: [beta, beta-tester]
    skill_file: agents/beta_tester/SKILL.md
    required_inputs:
      - AGENTS.md
      - agents/beta_tester/SKILL.md
      - agents/beta_tester/test_cases/INDEX.md
      - web/src/app/
    forbidden_inputs:
      - "기술 디테일·구현 추론 (사용자 관점 보존)"
    output_contract:
      - "BTC-NNN.md (사용자 관점 탐색 결과)"
      - "재현 단계 + 환경 + 기대 vs 실제"
    audit_gate: false
    notes: |
      Beta Tester는 기술 원인 분석을 하지 않는다. QA가 BUG로 변환.

  - id: owner
    aliases: [owner, user]
    skill_file: agents/owner/SKILL.md
    required_inputs:
      - "CEO 에이전트의 에스컬레이션·최종 승인 요청"
      - "Owner-facing BRIEF/PLAN (audience: Owner)"
    forbidden_inputs: []
    output_contract:
      - "큰 방향 전환·역할/워크플로 변경의 최종 승인"
      - "CEO가 에스컬레이션한 충돌·고위험 결정의 해소"
      - "파일 삭제·롤백·force push 등 파괴적 작업 승인 또는 거부"
    audit_gate: false
    notes: |
      Owner는 사람(사용자)이다. worker 가 아니며 orchestrator 가 자동 호출하지
      않는다. CEO 에이전트가 routine 을 자율 처리하고, 고위험·큰 방향 결정만
      Owner 에게 에스컬레이션한다. Owner 로 가는 보고는 최소화한다(나머지는
      CEO 에이전트가 수신). audience: Owner 인 보고만 Owner 를 향한다.
      일상적인 shell/python/git 조회·검증·비파괴 편집 판단은 CEO가 흡수한다.

