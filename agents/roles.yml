      으로 파고들어 명확성을 높이고 모호성을 줄이는 명확화 게이트다.
      scripts/ambiguity_scan.py(기계적 모호성 신호 스캔)를 INTAKE·매 답변 라운드에
      돌리고, SKILL.md 의 질문 프로토콜(ladder-up→W6H 커버→정보이득 순 batch 질문→
