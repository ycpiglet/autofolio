# Agent Role Registry (TASK-NNN)
#
# Canonical mapping of orchestrator role aliases to role profiles.
# Read by scripts/agent_context_packet.py and scripts/agent_orchestrator.py.
#
# Schema per role:
#   id              canonical role id (kebab-case)
#   aliases         orchestrator command shortcuts (`/qa`, `/lead-engineer`)
#   skill_file      authoritative SKILL.md path
#   required_inputs documents the role MUST read on bootstrap
#   forbidden_inputs documents the role MUST NOT read (independence/bias guard)
#   output_contract what the role is expected to produce
#   audit_gate      true if Independent Audit gate applies on completion
#   default_subagents  Stage 7-A subagent roles to dispatch by default
#                      (subset of scripts/subagent_dispatch.py SUBAGENT_ROLES:
#                       implementer / reviewer / auditor / strategist / skeptic).
#                      Worker role and subagent role are orthogonal — worker
#                      describes pipeline stage responsibility, subagent
#                      describes perspective responsibility. See TASK-NNN.
#   notes           free-text caveats
#
# Constraints:
# - dispatchable role ids match ROLE_ALIASES values in scripts/agent_orchestrator.py
#   (Owner is a human registry role and is intentionally not dispatchable)
# - skill_file must exist (validated by check_agent_docs.py)
# - required_inputs entries must be repo-relative paths

version: 1
schema: agent-role-registry/v1
updated_at: 2026-06-19T00:04:30+09:00

roles:
  - id: lead-engineer
    aliases: [lead, lead-engineer]
    skill_file: agents/lead_engineer/SKILL.md
    required_inputs:
      - AGENTS.md
      - README.md
      - agents/lead_engineer/STATUS.md
      - agents/lead_engineer/AUDIT-LOG.md
      - agents/lead_engineer/compound_log.md
      - agents/lead_engineer/SKILL.md
      - agents/lead_engineer/tasks/INDEX.md
    forbidden_inputs: []
    output_contract:
      - "Plan / Review / Compound / RETRO 산출물"
      - "TASK frontmatter + 본문 5W1H + Context Snapshot"
      - "BRIEF/PLAN 응답은 reports/에 자동 보관"
    audit_gate: true
    default_subagents: [strategist, reviewer, auditor]
    notes: |
      Lead Engineer는 Plan/Review/Compound의 owner. 본인이 owner인 TASK의
      self-review는 Independent Auditor가 same-session으로 검토하더라도
      audit 섹션에 명시 필요.

  - id: managing-partner
    aliases: [manage, managing-partner, partner]
    skill_file: agents/managing_partner/SKILL.md
    required_inputs:
      - AGENTS.md
      - agents/lead_engineer/STATUS.md
      - agents/managing_partner/INDEPENDENCE-RUBRIC.md
      - agents/managing_partner/SKILL.md
      - agents/lead_engineer/tasks/VIEW-by-workload.md
      - agents/lead_engineer/tasks/VIEW-by-priority.md
    forbidden_inputs:
      - "본인 owner가 아닌 진행 중 TASK의 구현 디테일 (편향 방지)"
    output_contract:
      - "역할 독립성 평가 / 부담 분배 점검 / 비용·범위 결정"
      - "Plan 단계 외부 관점 코멘트 (Bottom Line + Insight + Decision)"
    audit_gate: true
    notes: |
      Managing Partner는 구현 owner가 기본 아님. 구현 TASK에 참여하려면
      해당 TASK에서 명시적으로 owner/assignee로 지정 (AGENTS.md §3.1).

  - id: independent-auditor
    aliases: [audit, auditor, independent-auditor]
    skill_file: agents/independent_auditor/SKILL.md
    required_inputs:
      - AGENTS.md
      - agents/independent_auditor/AUDIT-GATE.md
      - agents/independent_auditor/SAFETY-GATE.md
      - agents/independent_auditor/SKILL.md
      - agents/lead_engineer/AUDIT-LOG.md
      - "관련 TASK diff (git diff)"
      - "관련 TASK 검증 출력 (commands + outputs)"
    forbidden_inputs:
      - "구현자의 사유·결정 토론 (편향 방지) — 검토 시점에 owner와 같은 LLM 세션을 쓰는 경우 same-session 명시"
      - "예측·추측·미래 계획 (감사는 현재 증거 기반)"
    output_contract:
      - "판정: 통과 / 보류 / 재검토 필요 (택1)"
      - "보류·재검토 시 해소 조건 필수"
      - "근거 5종 이상 (검증 가능성, 일관성, 정합성, 회귀 방지, self-review 명시)"
    audit_gate: false
    notes: |
      Auditor는 audit_gate 적용 주체이지 대상 아님. owner와 같은 LLM
      세션일 때는 §self-review 명시 필수.

  - id: doc-steward
    aliases: [doc, doc-steward, steward]
    skill_file: agents/doc_steward/SKILL.md
    required_inputs:
      - AGENTS.md
      - README.md
      - agents/lead_engineer/STATUS.md
      - agents/lead_engineer/AUDIT-LOG.md
      - agents/roles.yml
      - "latest agents/lead_engineer/CYCLE-*.md"
      - "latest agents/lead_engineer/reviews/REVIEW-*.md"
      - agents/lead_engineer/tasks/INDEX.md
      - "관련 TASK/MEETING/REPORT/role docs"
    forbidden_inputs:
      - "감사 판정·증거 충분성 결정 (Independent Auditor 책임)"
      - "제품 QA 검증·BUG 판정 (QA 책임)"
      - "TASK owner/priority/cycle scope 결정 (Lead Engineer/Managing Partner 책임)"
      - "제품 코드 구현"
    output_contract:
      - "Document Health Report (freshness/integrity/stale/missing/frontmatter/link findings)"
      - "Doc Steward Check 결과와 권장 owner"
      - "read-only validation 명령 출력 요약"
    audit_gate: false
    default_subagents: [reviewer]
    notes: |
      Doc Steward는 문서 정합성 관리자다. Independent Auditor, QA,
      Timeline 역할, Lead Engineer, Managing Partner를 대체하지 않는다.
      canonical source of truth는 기존 AGENTS/STATUS/CYCLE/REVIEW/TASK/AUDIT
      체계를 그대로 따른다.

  - id: scribe
    aliases: [scribe, archivist]
    skill_file: agents/scribe/SKILL.md
    required_inputs:
      - AGENTS.md
      - agents/scribe/SKILL.md
      - "Lead Engineer 또는 Doc Steward가 지정한 대상 문서"
      - "보존해야 할 canonical source 링크"
    forbidden_inputs:
      - "PR review / code review / security review"
      - "TASK assignment / owner 변경 / priority 변경"
      - "감사 판정 또는 timeline reconstruction"
      - "최신 hot 문서 강한 압축 (명시 지시 없을 때)"
      - "제품 코드 구현"
    output_contract:
      - "Scribe Cleanup Note (scope/compression level/preserved refs/changed sections)"
      - "작은 문서 정리 diff 또는 archive/compression 패치"
    audit_gate: false
    default_subagents: []
    notes: |
      Scribe는 정리·압축 worker다. canonical state가 이미 결정된 후에만
      문서 노이즈를 줄인다. 의미 판단이 필요하면 Lead Engineer 또는
      Doc Steward로 되돌린다.

  - id: research
    aliases: [research, research-agent, researcher]
    skill_file: agents/research_agent/SKILL.md
    required_inputs:
      - "Lead Engineer / Lead Designer / CEO 가 지정한 조사 질문"
      - "관련 TASK/MEETING/REVIEW 맥락"
      - "공식 문서·표준·선행 사례 출처"
    forbidden_inputs:
      - "방향성·우선순위·스코프 최종 결정 (CEO/Lead Engineer/Managing Partner 책임)"
      - "감사 판정 (Independent Auditor 책임)"
      - "별도 Research Engineer/번역 역할 신설"
      - "제품 코드 구현"
    output_contract:
      - "Evidence Note (질문/출처 링크/요약/적용 시사점/불확실성)"
      - "결정이 아니라 결정 근거를 제공"
    audit_gate: false
    default_subagents: []
    notes: |
      Research Agent는 증거·레퍼런스 제공 역할이다. 공식 문서·선행 사례·
      비교 패턴을 찾아 compact evidence note 로 제공하되 최종 결정은 하지
      않는다. plan agent_role_refactor_plan.md §3.5 기준.

  - id: business-planner
    aliases: [business, biz, business-planner, business-plan, planner-biz]
    skill_file: agents/business_planner/SKILL.md
    required_inputs:
      - AGENTS.md
      - README.md
      - agents/business_planner/SKILL.md
      - agents/project/BUSINESS-PLAN.md
      - agents/project/BUSINESS-ADMIN-REGISTER.md
      - agents/lead_engineer/STATUS.md
      - "관련 TASK/BRIEF/EVIDENCE 기록"
    forbidden_inputs:
      - "법률·세무·증권 규제 확정 자문"
      - "홈택스/정부24/외부기관 로그인·서명·제출·결제"
      - "검증되지 않은 수익·고객·시장 규모를 사실로 단정"
      - "제품 코드/KIS/order/risk/prod/secret 변경"
    output_contract:
      - "Business Plan section update + Owner Decision List"
      - "Agent Context Summary for downstream roles"
      - "가설/확정/Owner 결정/professional review 필요 항목 분리"
    audit_gate: false
    default_subagents: [strategist, reviewer]
    notes: |
      Business Planner는 사업계획서와 비전/사업모델 정본 owner다.
      행정·법규 절차는 Regulatory Admin, 투자자문/거래 규제 경계는
      Compliance Officer로 라우팅한다.

  - id: regulatory-admin
    aliases: [regulatory, reg-admin, regulatory-admin, business-admin, admin-compliance]
    skill_file: agents/regulatory_admin/SKILL.md
    required_inputs:
      - AGENTS.md
      - agents/regulatory_admin/SKILL.md
      - agents/project/BUSINESS-ADMIN-REGISTER.md
      - agents/project/BUSINESS-PLAN.md
      - "최신 official-source EVIDENCE note"
      - "Owner가 제공한 사업자등록/행정서류 입력값"
    forbidden_inputs:
      - "법률·세무·회계·증권 규제 최종 자문"
      - "홈택스/정부24/공공기관 로그인·인증·서명·제출·결제"
      - "주민등록번호·인증서·계좌·KIS key·API secret repo 저장"
      - "제품 code/order/risk/production DB gate 변경"
    output_contract:
      - "Admin Checklist + Source Register + Owner-only Step List"
      - "Document Packet Plan / HWPX field map"
      - "전문가·기관 확인 필요 watch list"
    audit_gate: true
    default_subagents: [reviewer, auditor]
    notes: |
      Regulatory Admin은 공식 출처 기반 절차·서식·문서 패킷 지원 역할이다.
      제출권한은 Owner에게만 있으며, 법률/세무 확정 자문을 하지 않는다.

  - id: marketing-growth
    aliases: [marketing, growth, marketing-growth, marketer]
    skill_file: agents/marketing_growth/SKILL.md
    required_inputs:
      - AGENTS.md
      - agents/marketing_growth/SKILL.md
      - agents/project/BUSINESS-PLAN.md
      - agents/project/MARKETING-BRIEF.md
      - "관련 compliance/business-plan evidence"
    forbidden_inputs:
      - "수익률·성과·안전성 보장 문구"
      - "투자자문/일임/로보어드바이저로 오인될 공개 claim"
      - "Owner 승인 없는 공개 게시·광고 집행·고객 이메일 발송"
      - "제품 코드/KIS/order/risk/prod/secret 변경"
    output_contract:
      - "Marketing Brief update + claim bank + banned-claim list"
      - "Channel-specific campaign/copy draft"
      - "Compliance Officer review flag for financial/performance claims"
    audit_gate: false
    default_subagents: [strategist, reviewer]
    notes: |
      Marketing Growth는 승인된 사업계획서를 홍보/판매 자료로 변환한다.
      사업모델 자체를 결정하지 않고, public action은 Owner 승인 대상이다.

  - id: finance-accounting
    aliases: [finance, accounting, finance-accounting, finops, planning-finance]
    skill_file: agents/finance_accounting/SKILL.md
    required_inputs:
      - AGENTS.md
      - agents/finance_accounting/SKILL.md
      - agents/project/BUSINESS-PLAN.md
      - agents/project/MEMBERSHIP-PAYMENT-EVIDENCE-POLICY.md
      - agents/project/MEMBERSHIP-PAYMENT-RECOGNITION-DECISION-PACKET.md
      - agents/project/FINANCE-ACCOUNTING-ROADMAP.md
      - agents/lead_engineer/STATUS.md
      - "관련 portfolio/membership/business/compliance TASK 기록"
    forbidden_inputs:
      - "법률·세무·회계·증권·투자자문 최종 자문"
      - "주문 실행·수익실현·추가매수·리밸런싱 지시"
      - "실계좌·입금기록·원문 명세·고객 결제정보·secret repo 저장"
      - "KIS/order/risk/prod/deploy 변경"
    output_contract:
      - "Plan-vs-expected finance roadmap + gap matrix"
      - "Portfolio/accounting planning support scenario packet"
      - "Owner Decision List + professional-review watch list"
    audit_gate: true
    default_subagents: [strategist, reviewer, auditor]
    notes: |
      Finance Accounting은 세무회계 확정 자문이 아니라 planning-support
      역할이다. 목표수익률 대비 예상, 부족한 운영 준비, 재배분 후보,
      타임라인 후보를 evidence-gated candidate로 정리하며 실제 투자행동은
      Owner/Compliance/전문가 검토 전까지 열지 않는다.

  - id: timeline
    aliases: [timeline, timeline-agent, chronology]
    skill_file: agents/timeline_agent/SKILL.md
    required_inputs:
      - agents/lead_engineer/AUDIT-LOG.md
      - agents/lead_engineer/tasks/INDEX.md
      - "관련 CYCLE/MEETING/REVIEW 기록과 agents/messages 로그"
    forbidden_inputs:
      - "문서 압축·정리 (Scribe 책임)"
      - "canonical 문서 확정 (Doc Steward/Lead Engineer 책임)"
      - "TASK assignment / 우선순위 결정"
      - "제품 코드 구현"
    output_contract:
      - "Timeline Reconstruction (시간순 이벤트 표 + 출처 ID + 모호 구간 표기)"
      - "Doc Steward/Lead Engineer 에 chronology 입력 제공"
    audit_gate: false
    default_subagents: []
    notes: |
      Timeline Agent는 워크플로 연대기 전문 역할이다. CYCLE/TASK/MEETING/
      AUDIT/message 순서를 재구성해 "무엇이 먼저였고 어디가 모호한지"를
      설명한다. 문서를 압축하거나 canonical 을 결정하거나 작업을 분장하지
      않는다. plan agent_role_refactor_plan.md §3.6 기준.

