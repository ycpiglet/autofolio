    output_contract:
      - "목표·스코프·우선순위 자율 결정, Lead Engineer 지시, 팀 보고 수신"
      - "고위험·큰 방향 결정만 Owner 에게 에스컬레이션"
      - "routine 명령·검증·비용·리스크 판단을 흡수해 Owner 개입 최소화"
    audit_gate: false
    default_subagents: []
    notes: |
      CEO는 자율 조율 에이전트다(사람 아님). 목표·스코프·우선순위를 자율
      판단하고 Lead Engineer 와 협의하며 팀 보고를 수신한다. Owner(사람)에게는
      큰 방향 전환·역할/워크플로 변경·고위험·비용 초과 결정만 에스컬레이션해
      Owner 보고를 줄인다. routine 보고의 기본 수신자는 CEO 다. routine
      bash/python/git 조회·검증·비파괴 편집 판단은 CEO가 관리한다. 삭제·롤백·
      force push·운영 DB·secret·production deploy·치명 결함은 Owner 에스컬레이션.
      역할 본체는 agents/ceo/SKILL.md.

