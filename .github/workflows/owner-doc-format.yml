name: owner-doc-format

on:
  pull_request:
  push:
    branches: [main]

jobs:
  owner-doc-format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Check Owner document format
        run: python scripts/owner_doc_format_gate.py --manifest owner-docs.yml --allow-empty
