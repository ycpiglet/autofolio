[pytest]
# Autofolio 프로젝트 테스트 = tests/ (앱 단위 + Streamlit AppTest).
# agent_runtime 프레임워크 자체 스크립트 테스트는 `pytest scripts` 로 별도 실행한다.
#   일부(test_task_api/test_task_mcp/test_session_start_hook 등 ~36개)는 agent_runtime
#   고유 TASK 코퍼스·로컬 스케줄 데몬·호스트 경로에 의존해 이 호스트에서 red 가 정상이며,
#   test_role_mentions 는 상위 v0.1.5 템플릿의 orchestrator_safety_gate.py 누락으로 collection-error.
#   → Autofolio 회귀 신호를 흐리지 않도록 기본 수집 경로를 tests/ 로 한정.
testpaths = tests
